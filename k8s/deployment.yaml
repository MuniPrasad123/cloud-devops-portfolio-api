apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-devops-portfolio-api
  labels:
    app: cloud-devops-portfolio-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloud-devops-portfolio-api
  template:
    metadata:
      labels:
        app: cloud-devops-portfolio-api
    spec:
      containers:
        - name: cloud-devops-portfolio-api
          image: your-registry/cloud-devops-portfolio-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: kubernetes
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
